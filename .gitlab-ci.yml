workflow:
  rules:
    - if: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
    - when: never

stages:
  - build
  - deploy

default:
  image: oven/bun:1.2.22
  interruptible: true
  variables:
    NODE_OPTIONS: "--max-old-space-size=4096"
    R2_BUCKET: "realitystorage"
    CDN_URL: "https://cdn.reality.catlabdesign.space"
    CARGO_HOME: "$CI_PROJECT_DIR/.cache/cargo"
    RUSTUP_HOME: "$CI_PROJECT_DIR/.cache/rustup"
    BUN_INSTALL_CACHE_DIR: "$CI_PROJECT_DIR/.cache/bun/install/cache"
    ELECTRON_CACHE: "$CI_PROJECT_DIR/.cache/electron"
    ELECTRON_BUILDER_CACHE: "$CI_PROJECT_DIR/.cache/electron-builder"
  before_script:
    - apt-get update -y
    - apt-get install -y --no-install-recommends ca-certificates curl git jq findutils sed
    - mkdir -p "$CARGO_HOME" "$RUSTUP_HOME" "$BUN_INSTALL_CACHE_DIR" "$ELECTRON_CACHE" "$ELECTRON_BUILDER_CACHE"
  cache:
    key:
      files:
        - bun.lock
        - package.json
        - native/package.json
        - native/Cargo.lock
    paths:
      - .cache/bun/install/cache
      - .cache/electron
      - .cache/electron-builder
      - .cache/cargo
      - .cache/rustup
    policy: pull-push

build:linux:
  stage: build
  script:
    - apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev python3 make g++ rpm fakeroot xz-utils
    - |
      if [ ! -x "$CARGO_HOME/bin/rustup" ]; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
      fi
    - export PATH="$CARGO_HOME/bin:$PATH"
    - rustc --version
    - cargo --version
    - bun --version
    - bun install --frozen-lockfile
    - cd native
    - bun install --frozen-lockfile
    - bun run build
    - cd ..
    - bun run build
    - bunx electron-builder --linux --publish never
    - |
      if [ "${ENABLE_FLATPAK_RELEASE:-false}" = "true" ] && { [ -n "${CI_COMMIT_TAG:-}" ] || [ "${CI_PIPELINE_SOURCE:-}" = "web" ]; }; then
        apt-get install -y --no-install-recommends flatpak flatpak-builder elfutils
        flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo || true
        bunx electron-builder --linux flatpak --publish never
      fi
    - test -f release-build/latest-linux.yml
    - ls -lah release-build
  artifacts:
    name: "reality-launcher-linux-$CI_COMMIT_SHORT_SHA"
    expire_in: 30 days
    paths:
      - release-build/*.AppImage
      - release-build/*.deb
      - release-build/*.rpm
      - release-build/*.flatpak
      - release-build/latest-linux.yml
  rules:
    - if: "$CI_COMMIT_TAG"
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

deploy:r2:
  stage: deploy
  needs:
    - job: build:linux
      artifacts: true
  script:
    - set -eu
    - |
      if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
        echo "ERROR: CLOUDFLARE_API_TOKEN is not set"
        exit 1
      fi
      if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
        echo "ERROR: CLOUDFLARE_ACCOUNT_ID is not set"
        exit 1
      fi
    - |
      if [ -n "${RELEASE_VERSION:-}" ]; then
        VERSION="${RELEASE_VERSION}"
      elif [ -n "${CI_COMMIT_TAG:-}" ] && printf '%s' "${CI_COMMIT_TAG}" | grep -Eq '^v'; then
        VERSION="${CI_COMMIT_TAG#v}"
      else
        VERSION="$(jq -r '.version' package.json)"
      fi
      echo "Deploy version: $VERSION"
      echo "VERSION=$VERSION" >> deploy.env
      export VERSION
    - |
      for file in release-build/*.AppImage release-build/*.deb release-build/*.rpm release-build/*.flatpak; do
        if [ -f "$file" ]; then
          filename="$(basename "$file")"
          echo "Uploading $filename to /client/$VERSION/"
          bunx wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$filename" --file="$file" --content-type="application/octet-stream"
        fi
      done
    - |
      latest_linux_yml="$(find release-build -name latest-linux.yml | head -n 1 || true)"
      if [ -n "$latest_linux_yml" ]; then
        sed -i -E "s|^([[:space:]]*-[[:space:]]+url:[[:space:]]+)|\1$VERSION/|; s|^([[:space:]]*path:[[:space:]]+)|\1$VERSION/|" "$latest_linux_yml"
        bunx wrangler r2 object put --remote "$R2_BUCKET/client/latest-linux.yml" --file="$latest_linux_yml" --content-type="text/yaml"
      else
        echo "ERROR: latest-linux.yml not found"
        exit 1
      fi
    - |
      linux_path="$(find release-build -name '*.AppImage' | head -n 1 || true)"
      flatpak_path="$(find release-build -name '*.flatpak' | head -n 1 || true)"
      if [ -z "$linux_path" ]; then
        echo "ERROR: AppImage artifact not found"
        exit 1
      fi
      linux_file="$(basename "$linux_path")"
      linux_url="$CDN_URL/client/$VERSION/$(echo "$linux_file" | sed 's/ /%20/g')"
      if [ -n "$flatpak_path" ]; then
        flatpak_file="$(basename "$flatpak_path")"
        flatpak_url="$CDN_URL/client/$VERSION/$(echo "$flatpak_file" | sed 's/ /%20/g')"
      else
        flatpak_url=""
      fi
      changelog="${CHANGELOG:-}"
      jq -n \
        --arg version "$VERSION" \
        --arg releaseDate "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --arg changelog "$changelog" \
        --arg linux "$linux_url" \
        --arg flatpak "$flatpak_url" \
        '{
          version: $version,
          releaseDate: $releaseDate,
          changelog: $changelog,
          downloads: (
            { linux: $linux } +
            (if $flatpak == "" then {} else { flatpak: $flatpak } end)
          )
        }' > latest.json
      cat latest.json
      bunx wrangler r2 object put --remote "$R2_BUCKET/client/latest.json" --file="latest.json" --content-type="application/json"
    - bunx wrangler r2 object list --remote "$R2_BUCKET" --prefix="client/" | head -n 20
  artifacts:
    when: always
    expire_in: 7 days
    reports:
      dotenv: deploy.env
    paths:
      - latest.json
      - release-build/latest-linux.yml
  rules:
    - if: "$CI_COMMIT_TAG =~ /^v.+$/"
    - if: '$CI_COMMIT_BRANCH == "main" && $DEPLOY_ON_MAIN == "true"'
    - when: never
