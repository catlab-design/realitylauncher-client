name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      run_windows:
        description: 'Run Windows native build check'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Bun package downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock', 'native/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check app.asar safety
        run: bun run check:asar-writes

      - name: Build app bundles
        run: bun run build

      - name: Rust compile check
        run: cargo check --manifest-path native/Cargo.toml

  native-build-windows:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_windows == 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Bun package downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock', 'native/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native module (Windows)
        shell: pwsh
        run: |
          Set-Location native
          bun install --frozen-lockfile
          bun run build
