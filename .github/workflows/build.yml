name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: false
      changelog:
        description: 'Changelog (markdown format)'
        required: false
        default: ''
      build_windows:
        description: 'Also build Windows artifacts (extra GitHub Actions minutes)'
        required: false
        type: boolean
        default: false
      build_macos:
        description: 'Also build macOS artifacts (higher GitHub Actions minutes)'
        required: false
        type: boolean
        default: false
      publish_release:
        description: 'Publish release assets to R2 and GitHub Release'
        required: false
        type: boolean
        default: true
  repository_dispatch:
    types: [trigger-release]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  R2_BUCKET: realitystorage
  CDN_URL: https://cdn.reality.catlabdesign.space

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Determine build matrix
        id: set-matrix
        env:
          BUILD_WINDOWS: ${{ github.event.inputs.build_windows || github.event.client_payload.build_windows || 'false' }}
          BUILD_MACOS: ${{ github.event.inputs.build_macos || github.event.client_payload.build_macos || 'false' }}
          ENABLE_WINDOWS: ${{ vars.ENABLE_WINDOWS_RELEASE }}
          ENABLE_MS_STORE: ${{ vars.ENABLE_MS_STORE_RELEASE }}
          ENABLE_MACOS: ${{ vars.ENABLE_MACOS_RUNNER }}
        run: |
          PLATFORMS='[{"platform":"linux","runs_on":"ubuntu-latest"}]'
      
          if [[ "$ENABLE_WINDOWS" == "true" || "$ENABLE_MS_STORE" == "true" || "$BUILD_WINDOWS" == "true" ]]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq -c '. + [{"platform":"win","runs_on":"windows-latest"}]')
          fi
      
          if [[ "$ENABLE_MACOS" == "true" || "$BUILD_MACOS" == "true" ]]; then
            PLATFORMS=$(echo "$PLATFORMS" | jq -c '. + [{"platform":"mac","runs_on":"macos-latest"}]')
          fi
      
          MATRIX=$(jq -cn --argjson p "$PLATFORMS" '{"include":$p}')
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runs_on }}
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Bun package downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock', 'native/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Resolve build version
        id: resolve_version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          VERSION=""
          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="$INPUT_VERSION"
          elif [ -n "${DISPATCH_VERSION:-}" ]; then
            VERSION="$DISPATCH_VERSION"
          elif [ "${REF_TYPE:-}" = "tag" ] && [[ "${REF_NAME:-}" == v* ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved build version: $VERSION"

      - name: Update package.json version
        shell: bash
        env:
          RESOLVED_VERSION: ${{ steps.resolve_version.outputs.version }}
        run: |
          set -euo pipefail
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          if [ "$CURRENT_VERSION" != "$RESOLVED_VERSION" ]; then
            echo "Updating version from $CURRENT_VERSION to $RESOLVED_VERSION"
            npm version "$RESOLVED_VERSION" --no-git-tag-version --allow-same-version
          else
            echo "package.json already at version $CURRENT_VERSION"
          fi

      - name: Build Rust native module
        run: |
          cd native
          bun install
          bun run build
        env:
          CARGO_TERM_COLOR: always

      - name: Build application
        run: bun run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Cache Electron binaries (Windows)
        if: matrix.platform == 'win'
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package.json', 'package-lock.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Cache Electron binaries (Linux)
        if: matrix.platform == 'linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package.json', 'package-lock.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Cache Electron binaries (macOS)
        if: matrix.platform == 'mac'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package.json', 'package-lock.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Build Electron app (Windows, with retry)
        if: matrix.platform == 'win'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $maxAttempts = 3

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            Write-Host "Running electron-builder --win (attempt $attempt/$maxAttempts)"
            bun x electron-builder --win --publish never

            if ($LASTEXITCODE -eq 0) {
              Write-Host "electron-builder --win succeeded on attempt $attempt"
              exit 0
            }

            if ($attempt -lt $maxAttempts) {
              $waitSeconds = 20 * $attempt
              Write-Host "electron-builder --win failed with exit code $LASTEXITCODE. Retrying in $waitSeconds seconds..."
              Start-Sleep -Seconds $waitSeconds
            }
          }

          throw "electron-builder --win failed after $maxAttempts attempts."
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Setup Microsoft Store CLI (Windows release only)
        if: matrix.platform == 'win' && vars.ENABLE_MS_STORE_RELEASE == 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch')
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Build MSIX package (Windows release only)
        if: matrix.platform == 'win' && vars.ENABLE_MS_STORE_RELEASE == 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch')
        shell: pwsh
        env:
          MS_STORE_MSIX_ARCH: ${{ vars.MS_STORE_MSIX_ARCH }}
          MS_STORE_PRODUCT_ID: ${{ secrets.MS_STORE_PRODUCT_ID }}
        run: |
          $ErrorActionPreference = 'Stop'
          $arch = if ([string]::IsNullOrWhiteSpace($env:MS_STORE_MSIX_ARCH)) { 'x64' } else { $env:MS_STORE_MSIX_ARCH }
          $outputDir = Join-Path $env:GITHUB_WORKSPACE 'release-build\store-msix'
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null

          if ([string]::IsNullOrWhiteSpace($env:MS_STORE_PRODUCT_ID)) {
            msstore package "$env:GITHUB_WORKSPACE" -o "$outputDir" -a "$arch"
          } else {
            msstore package "$env:GITHUB_WORKSPACE" -o "$outputDir" -a "$arch" -id "$env:MS_STORE_PRODUCT_ID"
          }

          # Prefer .msixupload for Store submission. If only .msix exists, generate .msixupload.
          $msixUpload = Get-ChildItem -Path $outputDir -Recurse -File -Filter '*.msixupload' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $msix = Get-ChildItem -Path $outputDir -Recurse -File -Filter '*.msix' | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $msixUpload -and $msix) {
            $baseName = [System.IO.Path]::GetFileNameWithoutExtension($msix.Name)
            $sym = Get-ChildItem -Path $outputDir -Recurse -File -Filter '*.appxsym' | Where-Object { $_.BaseName -eq $baseName } | Select-Object -First 1

            $staging = Join-Path $outputDir '_msixupload'
            Remove-Item -Path $staging -Recurse -Force -ErrorAction SilentlyContinue
            New-Item -ItemType Directory -Path $staging | Out-Null

            Copy-Item -Path $msix.FullName -Destination $staging -Force
            if ($sym) {
              Copy-Item -Path $sym.FullName -Destination $staging -Force
            }

            $zipPath = Join-Path $outputDir "$baseName.zip"
            $uploadPath = Join-Path $outputDir "$baseName.msixupload"
            Remove-Item -Path $zipPath, $uploadPath -Force -ErrorAction SilentlyContinue
            Compress-Archive -Path (Join-Path $staging '*') -DestinationPath $zipPath -Force
            Move-Item -Path $zipPath -Destination $uploadPath -Force
            Remove-Item -Path $staging -Recurse -Force -ErrorAction SilentlyContinue

            $msixUpload = Get-Item -Path $uploadPath
            Write-Host "Generated MSIXUPLOAD package: $($msixUpload.FullName)"
          }

          $package = if ($msixUpload) { $msixUpload } else { $msix }
          if (-not $package) {
            throw 'MSIX package was not generated. Check msstore package logs.'
          }

          Write-Host "Generated Store package: $($package.FullName)"

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: bun x electron-builder --linux AppImage --publish never
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Install Flatpak dependencies (Linux release only)
        if: matrix.platform == 'linux' && vars.ENABLE_FLATPAK_RELEASE == 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch')
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak --user remotes

      - name: Build Flatpak bundle (Linux release only)
        if: matrix.platform == 'linux' && vars.ENABLE_FLATPAK_RELEASE == 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch')
        run: bun x electron-builder --linux flatpak --publish never
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: bun x electron-builder --mac --publish never
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: reality-launcher-windows
          path: |
            release-build/*.exe
            release-build/*.exe.blockmap
            release-build/store-msix/*.msix
            release-build/store-msix/*.msixupload
            release-build/latest.yml
          if-no-files-found: error
          retention-days: 7

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: reality-launcher-linux
          path: |
            release-build/*.AppImage
            release-build/*.deb
            release-build/*.rpm
            release-build/*.flatpak
            release-build/latest-linux.yml
          if-no-files-found: error
          retention-days: 7

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: reality-launcher-macos
          path: |
            release-build/*.dmg
            release-build/*.dmg.blockmap
            release-build/latest-mac.yml
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch') &&
      (
        github.event_name != 'workflow_dispatch' ||
        github.event.inputs.publish_release == 'true'
      )
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            VERSION="${INPUT_VERSION}"
          elif [ -n "${DISPATCH_VERSION:-}" ]; then
            VERSION="${DISPATCH_VERSION}"
          elif [ "${REF_TYPE:-}" = "tag" ] && [[ "${REF_NAME:-}" == v* ]]; then
            VERSION="${REF_NAME#v}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -R artifacts

      - name: Install wrangler
        shell: bash
        run: |
          set -euo pipefail
          bun install -g wrangler
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      
      - name: Verify R2 credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "=== Verifying R2 credentials ==="
          echo "Account ID: ${CLOUDFLARE_ACCOUNT_ID:0:8}..."
          echo "API Token set: $([ -n "$CLOUDFLARE_API_TOKEN" ] && echo 'YES' || echo 'NO')"
          
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN is not set!"
            exit 1
          fi
          
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ERROR: CLOUDFLARE_ACCOUNT_ID is not set!"
            exit 1
          fi
          
          echo "Listing R2 buckets to verify authentication..."
          wrangler r2 bucket list
          echo "✓ R2 authentication successful"

      - name: Upload Windows build to R2
        if: ${{ hashFiles('artifacts/reality-launcher-windows/**') != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          echo "=== Uploading Windows build for version $VERSION ==="
          
          # Upload installer to versioned folder
          for file in artifacts/reality-launcher-windows/*.exe; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/octet-stream"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          # Upload blockmap to versioned folder
          for file in artifacts/reality-launcher-windows/*.blockmap; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          # Upload MSIX packages to versioned folder
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/vnd.ms-appx"
              echo "Uploaded $FILENAME"
            fi
          done < <(find artifacts/reality-launcher-windows -type f \( -name "*.msix" -o -name "*.msixupload" \))
          
          # Modify latest.yml to include version folder in URL paths
          LATEST_YML=$(find artifacts/reality-launcher-windows -name latest.yml | head -n 1)
          if [ -n "$LATEST_YML" ]; then
            echo "Patching $LATEST_YML with version prefix..."
            sed -i -E "s|^([[:space:]]*-[[:space:]]+url:[[:space:]]+)|\1$VERSION/|; s|^([[:space:]]*path:[[:space:]]+)|\1$VERSION/|" "$LATEST_YML"
            cat "$LATEST_YML"
            echo "Uploading latest.yml..."
            wrangler r2 object put --remote "$R2_BUCKET/client/latest.yml" --file="$LATEST_YML" --content-type="text/yaml"
            echo "✓ Uploaded latest.yml"
          else
            echo "ERROR: latest.yml not found in artifacts/reality-launcher-windows!"
            find artifacts/reality-launcher-windows
            exit 1
          fi

      - name: Upload macOS build to R2
        if: ${{ hashFiles('artifacts/reality-launcher-macos/**') != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          echo "=== Uploading macOS build for version $VERSION ==="
          
          for file in artifacts/reality-launcher-macos/*.dmg; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/octet-stream"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          for file in artifacts/reality-launcher-macos/*.blockmap; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          LATEST_MAC_YML=$(find artifacts/reality-launcher-macos -name latest-mac.yml | head -n 1)
          if [ -n "$LATEST_MAC_YML" ]; then
            echo "Patching $LATEST_MAC_YML with version prefix..."
            sed -i -E "s|^([[:space:]]*-[[:space:]]+url:[[:space:]]+)|\1$VERSION/|; s|^([[:space:]]*path:[[:space:]]+)|\1$VERSION/|" "$LATEST_MAC_YML"
            cat "$LATEST_MAC_YML"
            echo "Uploading latest-mac.yml..."
            wrangler r2 object put --remote "$R2_BUCKET/client/latest-mac.yml" --file="$LATEST_MAC_YML" --content-type="text/yaml"
            echo "✓ Uploaded latest-mac.yml"
          fi

      - name: Upload Linux builds to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          echo "=== Uploading Linux build for version $VERSION ==="
          
          for file in artifacts/reality-launcher-linux/*.AppImage artifacts/reality-launcher-linux/*.deb artifacts/reality-launcher-linux/*.rpm artifacts/reality-launcher-linux/*.flatpak; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/octet-stream"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          LATEST_LINUX_YML=$(find artifacts/reality-launcher-linux -name latest-linux.yml | head -n 1)
          if [ -n "$LATEST_LINUX_YML" ]; then
            echo "Patching $LATEST_LINUX_YML with version prefix..."
            sed -i -E "s|^([[:space:]]*-[[:space:]]+url:[[:space:]]+)|\1$VERSION/|; s|^([[:space:]]*path:[[:space:]]+)|\1$VERSION/|" "$LATEST_LINUX_YML"
            cat "$LATEST_LINUX_YML"
            echo "Uploading latest-linux.yml..."
            wrangler r2 object put --remote "$R2_BUCKET/client/latest-linux.yml" --file="$LATEST_LINUX_YML" --content-type="text/yaml"
            echo "✓ Uploaded latest-linux.yml"
          fi

      - name: Create latest.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INPUT_CHANGELOG: ${{ github.event.inputs.changelog }}
          DISPATCH_CHANGELOG: ${{ github.event.client_payload.changelog }}
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          CHANGELOG="${INPUT_CHANGELOG:-${DISPATCH_CHANGELOG:-}}"
          
          # Detect actual filenames (handle spaces correctly)
          WIN_PATH=$(find artifacts/reality-launcher-windows -name "*.exe" | head -n 1 || true)
          MAC_PATH=$(find artifacts/reality-launcher-macos -name "*.dmg" | head -n 1 || true)
          LINUX_PATH=$(find artifacts/reality-launcher-linux -name "*.AppImage" | head -n 1 || true)
          FLATPAK_PATH=$(find artifacts/reality-launcher-linux -name "*.flatpak" | head -n 1 || true)

          if [ -z "$LINUX_PATH" ]; then
            echo "ERROR: Linux artifact is required but missing."
            find artifacts -maxdepth 3 -type f | sort
            exit 1
          fi
          
          LINUX_FILE=$(basename "$LINUX_PATH")

          # URL Encode filenames (replace spaces with %20)
          WIN_URL=""
          if [ -n "$WIN_PATH" ]; then
            WIN_FILE=$(basename "$WIN_PATH")
            WIN_URL="$CDN_URL/client/$VERSION/$(echo "$WIN_FILE" | sed 's/ /%20/g')"
          fi
          MAC_URL=""
          if [ -n "$MAC_PATH" ]; then
            MAC_FILE=$(basename "$MAC_PATH")
            MAC_URL="$CDN_URL/client/$VERSION/$(echo "$MAC_FILE" | sed 's/ /%20/g')"
          fi
          LINUX_URL="$CDN_URL/client/$VERSION/$(echo "$LINUX_FILE" | sed 's/ /%20/g')"
          FLATPAK_URL=""
          if [ -n "$FLATPAK_PATH" ]; then
            FLATPAK_FILE=$(basename "$FLATPAK_PATH")
            FLATPAK_URL="$CDN_URL/client/$VERSION/$(echo "$FLATPAK_FILE" | sed 's/ /%20/g')"
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg releaseDate "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg changelog "$CHANGELOG" \
            --arg windows "$WIN_URL" \
            --arg mac "$MAC_URL" \
            --arg linux "$LINUX_URL" \
            --arg flatpak "$FLATPAK_URL" \
            '{
              version: $version,
              releaseDate: $releaseDate,
              changelog: $changelog,
              downloads: (
                (if $windows == "" then {} else { windows: $windows } end) +
                { linux: $linux } +
                (if $mac == "" then {} else { mac: $mac } end) +
                (if $flatpak == "" then {} else { flatpak: $flatpak } end)
              )
            }' > latest.json
          
          echo "=== latest.json ==="
          cat latest.json
          
          echo "Uploading latest.json..."
          wrangler r2 object put --remote "$R2_BUCKET/client/latest.json" --file="latest.json" --content-type="application/json"
          echo "✓ Uploaded latest.json"

      - name: Verify R2 upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "=== Verifying R2 upload ==="
          echo "Checking for uploaded files..."
          
          # List objects with client prefix
          wrangler r2 object list --remote "$R2_BUCKET" --prefix="client/" | head -20
          
          echo ""
          echo "✓ Files should be available at:"
          echo "  - $CDN_URL/client/latest.yml"
          echo "  - $CDN_URL/client/latest.json"
          echo "  - $CDN_URL/client/${{ steps.version.outputs.version }}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Reality Launcher v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            artifacts/reality-launcher-windows/*.exe
            artifacts/reality-launcher-windows/**/*.msix
            artifacts/reality-launcher-windows/**/*.msixupload
            artifacts/reality-launcher-macos/*.dmg
            artifacts/reality-launcher-linux/*.AppImage
            artifacts/reality-launcher-linux/*.deb
            artifacts/reality-launcher-linux/*.rpm
            artifacts/reality-launcher-linux/*.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  microsoft-store:
    needs: release
    runs-on: windows-latest
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch') && vars.ENABLE_MS_STORE_RELEASE == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: reality-launcher-windows
          path: artifacts/reality-launcher-windows

      - name: Validate Microsoft Store secrets
        shell: pwsh
        env:
          MS_STORE_SELLER_ID: ${{ secrets.MS_STORE_SELLER_ID }}
          MS_STORE_PRODUCT_ID: ${{ secrets.MS_STORE_PRODUCT_ID }}
          MS_STORE_TENANT_ID: ${{ secrets.MS_STORE_TENANT_ID }}
          MS_STORE_CLIENT_ID: ${{ secrets.MS_STORE_CLIENT_ID }}
          MS_STORE_CLIENT_SECRET: ${{ secrets.MS_STORE_CLIENT_SECRET }}
        run: |
          $ErrorActionPreference = 'Stop'
          $required = @(
            'MS_STORE_SELLER_ID',
            'MS_STORE_PRODUCT_ID',
            'MS_STORE_TENANT_ID',
            'MS_STORE_CLIENT_ID',
            'MS_STORE_CLIENT_SECRET'
          )

          $missing = @()
          foreach ($key in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$key" -ErrorAction SilentlyContinue).Value)) {
              $missing += $key
            }
          }

          if ($missing.Count -gt 0) {
            throw "Missing required secrets: $($missing -join ', ')"
          }

      - name: Setup Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.2

      - name: Configure Microsoft Store CLI credentials
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          msstore reconfigure --tenantId "${{ secrets.MS_STORE_TENANT_ID }}" --sellerId "${{ secrets.MS_STORE_SELLER_ID }}" --clientId "${{ secrets.MS_STORE_CLIENT_ID }}" --clientSecret "${{ secrets.MS_STORE_CLIENT_SECRET }}"

      - name: Locate MSIX artifact
        id: msix
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $package = Get-ChildItem -Path 'artifacts/reality-launcher-windows' -Recurse -File | Where-Object { $_.Extension -in '.msix', '.msixupload' } | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $package) {
            throw 'MSIX package artifact not found. Ensure build job generated release-build/store-msix/*.msix or *.msixupload.'
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "package_path=$($package.FullName)"
          Write-Host "Using package: $($package.FullName)"

      - name: Publish MSIX to Microsoft Store
        shell: pwsh
        env:
          MS_STORE_NO_COMMIT: ${{ vars.MS_STORE_NO_COMMIT }}
        run: |
          $ErrorActionPreference = 'Stop'
          $packagePath = "${{ steps.msix.outputs.package_path }}"
          $appId = "${{ secrets.MS_STORE_PRODUCT_ID }}"
          $noCommit = "${env:MS_STORE_NO_COMMIT}"

          if ($noCommit -eq 'true') {
            msstore publish "${{ github.workspace }}" -i "$packagePath" -id "$appId" -nc
            Write-Host 'Submission created as draft (no commit).'
          } else {
            msstore publish "${{ github.workspace }}" -i "$packagePath" -id "$appId"
            msstore submission poll "$appId"
          }
