name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: false
      changelog:
        description: 'Changelog (markdown format)'
        required: false
        default: ''
  repository_dispatch:
    types: [trigger-release]

env:
  R2_BUCKET: realitystorage
  CDN_URL: https://cdn.reality.catlabdesign.space

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bun run build

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: bun run dist:win

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: bun run dist:mac

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: bun run dist:linux

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: reality-launcher-windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: reality-launcher-macos
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/latest-mac.yml
          retention-days: 30

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: reality-launcher-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/latest-linux.yml
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -R artifacts

      - name: Check R2 Configuration
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler
          echo "Target Bucket: $R2_BUCKET"
          echo "Account ID: $CLOUDFLARE_ACCOUNT_ID"
          echo "API Token set: $([ -n "$CLOUDFLARE_API_TOKEN" ] && echo 'YES' || echo 'NO')"
          echo "Listing Buckets:"
          wrangler r2 bucket list 2>&1 || echo "Could not list buckets"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Reality Launcher v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/reality-launcher-windows/*.exe
            artifacts/reality-launcher-macos/*.dmg
            artifacts/reality-launcher-linux/*.AppImage
            artifacts/reality-launcher-linux/*.deb
            artifacts/reality-launcher-linux/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # Upload to Cloudflare R2 (realitystorage bucket)
      # ============================================
      
      - name: Setup Node.js for wrangler
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload Windows build to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Uploading Windows build for version $VERSION"
          echo "Files in artifacts/reality-launcher-windows:"
          ls -la artifacts/reality-launcher-windows/ || echo "Directory not found"
          
          # Upload installer
          for file in artifacts/reality-launcher-windows/*.exe; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to R2..."
              wrangler r2 object put "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/octet-stream" 2>&1
              echo "Upload exit code: $?"
            fi
          done
          # Upload blockmap
          for file in artifacts/reality-launcher-windows/*.blockmap; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to R2..."
              wrangler r2 object put "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" 2>&1
              echo "Upload exit code: $?"
            fi
          done
          # Upload latest.yml
          if [ -f "artifacts/reality-launcher-windows/latest.yml" ]; then
            echo "Uploading latest.yml..."
            wrangler r2 object put "$R2_BUCKET/client/latest.yml" --file="artifacts/reality-launcher-windows/latest.yml" --content-type="text/yaml" 2>&1
            echo "Upload exit code: $?"
          else
            echo "latest.yml not found!"
          fi

      - name: Upload macOS build to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Uploading macOS build for version $VERSION"
          echo "Files in artifacts/reality-launcher-macos:"
          ls -la artifacts/reality-launcher-macos/ || echo "Directory not found"
          
          for file in artifacts/reality-launcher-macos/*.dmg; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to R2..."
              wrangler r2 object put "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/octet-stream" 2>&1
              echo "Upload exit code: $?"
            fi
          done
          # Upload blockmap
          for file in artifacts/reality-launcher-macos/*.blockmap; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to R2..."
              wrangler r2 object put "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" 2>&1
              echo "Upload exit code: $?"
            fi
          done
          # Upload latest-mac.yml
          if [ -f "artifacts/reality-launcher-macos/latest-mac.yml" ]; then
            echo "Uploading latest-mac.yml..."
            wrangler r2 object put "$R2_BUCKET/client/latest-mac.yml" --file="artifacts/reality-launcher-macos/latest-mac.yml" --content-type="text/yaml" 2>&1
            echo "Upload exit code: $?"
          else
            echo "latest-mac.yml not found!"
          fi

      - name: Upload Linux builds to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          echo "Uploading Linux build for version $VERSION"
          echo "Files in artifacts/reality-launcher-linux:"
          ls -la artifacts/reality-launcher-linux/ || echo "Directory not found"
          
          for file in artifacts/reality-launcher-linux/*.AppImage artifacts/reality-launcher-linux/*.deb; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to R2..."
              wrangler r2 object put "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/octet-stream" 2>&1
              echo "Upload exit code: $?"
            fi
          done
          # Upload latest-linux.yml
          if [ -f "artifacts/reality-launcher-linux/latest-linux.yml" ]; then
            echo "Uploading latest-linux.yml..."
            wrangler r2 object put "$R2_BUCKET/client/latest-linux.yml" --file="artifacts/reality-launcher-linux/latest-linux.yml" --content-type="text/yaml" 2>&1
            echo "Upload exit code: $?"
          else
            echo "latest-linux.yml not found!"
          fi

      - name: Update latest.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INPUT_CHANGELOG: ${{ github.event.inputs.changelog }}
          DISPATCH_CHANGELOG: ${{ github.event.client_payload.changelog }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Get changelog from input or repository_dispatch payload
          CHANGELOG="${INPUT_CHANGELOG:-${DISPATCH_CHANGELOG:-}}"
          # Escape special characters for JSON
          CHANGELOG_ESCAPED=$(echo "$CHANGELOG" | sed 's/\\/\\\\/g; s/"/\\"/g' | tr '\n' ' ')
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "releaseDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "changelog": "$CHANGELOG_ESCAPED",
            "downloads": {
              "windows": "$CDN_URL/client/$VERSION/Reality-Launcher-Setup.exe",
              "macos": "$CDN_URL/client/$VERSION/Reality-Launcher.dmg",
              "linux": "$CDN_URL/client/$VERSION/Reality-Launcher.AppImage"
            }
          }
          EOF
          echo "=== latest.json ==="
          cat latest.json
          wrangler r2 object put "$R2_BUCKET/client/latest.json" --file="latest.json"

      - name: Verify R2 upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Verifying R2 upload ==="
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Listing objects in bucket..."
          wrangler r2 object list "$R2_BUCKET" --prefix="client/" 2>&1 || echo "Could not list objects"
          echo "Files should be available at: $CDN_URL/client/${{ steps.version.outputs.version }}/"


