name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: false
      changelog:
        description: 'Changelog (markdown format)'
        required: false
        default: ''
  repository_dispatch:
    types: [trigger-release]

env:
  R2_BUCKET: realitystorage
  CDN_URL: https://cdn.reality.catlabdesign.space

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bun run build

      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: bun run dist:win

      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: bun run dist:mac

      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: bun run dist:linux

      - name: Upload Windows artifacts
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: reality-launcher-windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          retention-days: 30

      - name: Upload macOS artifacts
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: reality-launcher-macos
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/latest-mac.yml
          retention-days: 30

      - name: Upload Linux artifacts
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: reality-launcher-linux
          path: |
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/latest-linux.yml
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "=== Downloaded artifacts ==="
          ls -R artifacts

      - name: Setup Node.js for wrangler
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Verify R2 credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "=== Verifying R2 credentials ==="
          echo "Account ID: ${CLOUDFLARE_ACCOUNT_ID:0:8}..."
          echo "API Token set: $([ -n "$CLOUDFLARE_API_TOKEN" ] && echo 'YES' || echo 'NO')"
          
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "ERROR: CLOUDFLARE_API_TOKEN is not set!"
            exit 1
          fi
          
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ERROR: CLOUDFLARE_ACCOUNT_ID is not set!"
            exit 1
          fi
          
          echo "Listing R2 buckets to verify authentication..."
          wrangler r2 bucket list
          echo "✓ R2 authentication successful"

      - name: Upload Windows build to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          echo "=== Uploading Windows build for version $VERSION ==="
          
          # Upload installer to versioned folder
          for file in artifacts/reality-launcher-windows/*.exe; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/octet-stream"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          # Upload blockmap to versioned folder
          for file in artifacts/reality-launcher-windows/*.blockmap; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          # Modify latest.yml to include version folder in URL paths
          if [ -f "artifacts/reality-launcher-windows/latest.yml" ]; then
            echo "Patching latest.yml with version prefix..."
            sed -i "s|url: |url: $VERSION/|g" artifacts/reality-launcher-windows/latest.yml
            cat artifacts/reality-launcher-windows/latest.yml
            echo "Uploading latest.yml..."
            wrangler r2 object put --remote "$R2_BUCKET/client/latest.yml" --file="artifacts/reality-launcher-windows/latest.yml" --content-type="text/yaml"
            echo "✓ Uploaded latest.yml"
          else
            echo "ERROR: latest.yml not found!"
            exit 1
          fi

      - name: Upload macOS build to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          echo "=== Uploading macOS build for version $VERSION ==="
          
          for file in artifacts/reality-launcher-macos/*.dmg; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/octet-stream"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          for file in artifacts/reality-launcher-macos/*.blockmap; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          if [ -f "artifacts/reality-launcher-macos/latest-mac.yml" ]; then
            echo "Patching latest-mac.yml with version prefix..."
            sed -i "s|url: |url: $VERSION/|g" artifacts/reality-launcher-macos/latest-mac.yml
            cat artifacts/reality-launcher-macos/latest-mac.yml
            echo "Uploading latest-mac.yml..."
            wrangler r2 object put --remote "$R2_BUCKET/client/latest-mac.yml" --file="artifacts/reality-launcher-macos/latest-mac.yml" --content-type="text/yaml"
            echo "✓ Uploaded latest-mac.yml"
          fi

      - name: Upload Linux builds to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          echo "=== Uploading Linux build for version $VERSION ==="
          
          for file in artifacts/reality-launcher-linux/*.AppImage artifacts/reality-launcher-linux/*.deb; do
            if [ -f "$file" ]; then
              FILENAME=$(basename "$file")
              echo "Uploading $FILENAME to /client/$VERSION/..."
              wrangler r2 object put --remote "$R2_BUCKET/client/$VERSION/$FILENAME" --file="$file" --content-type="application/octet-stream"
              echo "✓ Uploaded $FILENAME"
            fi
          done
          
          if [ -f "artifacts/reality-launcher-linux/latest-linux.yml" ]; then
            echo "Patching latest-linux.yml with version prefix..."
            sed -i "s|url: |url: $VERSION/|g" artifacts/reality-launcher-linux/latest-linux.yml
            cat artifacts/reality-launcher-linux/latest-linux.yml
            echo "Uploading latest-linux.yml..."
            wrangler r2 object put --remote "$R2_BUCKET/client/latest-linux.yml" --file="artifacts/reality-launcher-linux/latest-linux.yml" --content-type="text/yaml"
            echo "✓ Uploaded latest-linux.yml"
          fi

      - name: Create latest.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INPUT_CHANGELOG: ${{ github.event.inputs.changelog }}
          DISPATCH_CHANGELOG: ${{ github.event.client_payload.changelog }}
        run: |
          set -e
          VERSION=${{ steps.version.outputs.version }}
          CHANGELOG="${INPUT_CHANGELOG:-${DISPATCH_CHANGELOG:-}}"
          CHANGELOG_ESCAPED=$(echo "$CHANGELOG" | sed 's/\\/\\\\/g; s/"/\\"/g' | tr '\n' ' ')
          
          # Detect actual filenames
          WIN_FILE=$(basename $(ls artifacts/reality-launcher-windows/*.exe | head -n 1))
          MAC_FILE=$(basename $(ls artifacts/reality-launcher-macos/*.dmg | head -n 1))
          LINUX_AppImage=$(basename $(ls artifacts/reality-launcher-linux/*.AppImage | head -n 1))
          
          # URL Encode filenames (replace spaces with %20)
          WIN_URL="$CDN_URL/client/$VERSION/$(echo "$WIN_FILE" | sed 's/ /%20/g')"
          MAC_URL="$CDN_URL/client/$VERSION/$(echo "$MAC_FILE" | sed 's/ /%20/g')"
          LINUX_URL="$CDN_URL/client/$VERSION/$(echo "$LINUX_AppImage" | sed 's/ /%20/g')"
          
          cat > latest.json <<EOF
          {
            "version": "$VERSION",
            "releaseDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "changelog": "$CHANGELOG_ESCAPED",
            "downloads": {
              "windows": "$WIN_URL",
              "macos": "$MAC_URL",
              "linux": "$LINUX_URL"
            }
          }
          EOF
          
          echo "=== latest.json ==="
          cat latest.json
          
          echo "Uploading latest.json..."
          wrangler r2 object put --remote "$R2_BUCKET/client/latest.json" --file="latest.json" --content-type="application/json"
          echo "✓ Uploaded latest.json"

      - name: Verify R2 upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          echo "=== Verifying R2 upload ==="
          echo "Checking for uploaded files..."
          
          # List objects with client prefix
          wrangler r2 object list --remote "$R2_BUCKET" --prefix="client/" | head -20
          
          echo ""
          echo "✓ Files should be available at:"
          echo "  - $CDN_URL/client/latest.yml"
          echo "  - $CDN_URL/client/latest.json"
          echo "  - $CDN_URL/client/${{ steps.version.outputs.version }}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Reality Launcher v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/reality-launcher-windows/*.exe
            artifacts/reality-launcher-macos/*.dmg
            artifacts/reality-launcher-linux/*.AppImage
            artifacts/reality-launcher-linux/*.deb
            artifacts/reality-launcher-linux/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
