name: Bug report
description: Report a reproducible bug in Reality Launcher Client
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include clear reproduction steps and logs/screenshots when possible.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is the bug?
      placeholder: Brief description
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps so maintainers can reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version / commit
      placeholder: v3.0.0 or commit SHA
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: Windows 11 / Ubuntu 24.04 / macOS 15
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste logs or attach screenshots if available
